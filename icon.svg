<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1b35"/>
    </linearGradient>
    <linearGradient id="pin-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29d8f5"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#03a9f4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#03a9f4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="46" fill="url(#bg)"/>

  <!-- Subtle grid (blueprint feel) -->
  <g opacity="0.06" stroke="#7fb3d3" stroke-width="1">
    <line x1="0"   y1="64"  x2="256" y2="64"/>
    <line x1="0"   y1="128" x2="256" y2="128"/>
    <line x1="0"   y1="192" x2="256" y2="192"/>
    <line x1="64"  y1="0"   x2="64"  y2="256"/>
    <line x1="128" y1="0"   x2="128" y2="256"/>
    <line x1="192" y1="0"   x2="192" y2="256"/>
  </g>

  <!-- ── Floor plan ── -->
  <!-- Room fill (very subtle) -->
  <rect x="30" y="50" width="196" height="160" rx="4"
        fill="rgba(255,255,255,0.03)"/>

  <!-- Outer walls -->
  <rect x="30" y="50" width="196" height="160" rx="4"
        fill="none" stroke="#9fc4de" stroke-width="7" stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Internal vertical wall (left third) -->
  <line x1="104" y1="50" x2="104" y2="152"
        stroke="#9fc4de" stroke-width="6"/>

  <!-- Internal horizontal wall (lower zone) -->
  <line x1="30" y1="152" x2="226" y2="152"
        stroke="#9fc4de" stroke-width="6"/>

  <!-- Door gap — bottom of top-left room -->
  <rect x="52" y="146" width="30" height="12" fill="#1a1a2e"/>

  <!-- Door gap — right side of left vertical wall -->
  <rect x="98"  y="96" width="12" height="32" fill="#0d1b35"/>

  <!-- ── Main entity pin (top-left room) ── -->
  <!-- Outer glow -->
  <circle cx="67" cy="96" r="34" fill="url(#glow)"/>

  <!-- Pin head -->
  <circle cx="67" cy="89" r="21" fill="url(#pin-grad)" filter="url(#shadow)"/>

  <!-- Pin inner ring -->
  <circle cx="67" cy="89" r="21" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Pin inner dot -->
  <circle cx="67" cy="89" r="9" fill="#1a1a2e" opacity="0.85"/>

  <!-- Pin tip -->
  <path d="M67,110 L54,100 Q67,128 80,100 Z" fill="url(#pin-grad)" filter="url(#shadow)"/>

  <!-- ── Secondary entities (smaller dots) ── -->
  <!-- Top-right room -->
  <circle cx="165" cy="90" r="7" fill="#03a9f4" opacity="0.55"/>
  <circle cx="165" cy="90" r="7" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Bottom-right room -->
  <circle cx="178" cy="177" r="6" fill="#03a9f4" opacity="0.4"/>

  <!-- Bottom-left room -->
  <circle cx="65"  cy="177" r="6" fill="#03a9f4" opacity="0.35"/>

  <!-- ── "CF" subtle monogram bottom-right ── -->
  <text x="212" y="238" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#9fc4de" opacity="0.35" text-anchor="middle">CF</text>
</svg>
